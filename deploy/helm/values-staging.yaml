# Staging environment values for edge-logs
# This overrides default values in edge-logs/values.yaml

# 使用国内镜像仓库
global:
  imageRegistry: "quanzhenglong.com/edge"

namespaceOverride: "edge-logs-staging"

# APIServer
apiserver:
  image:
    tag: "main"

  replicaCount: 1

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# Frontend
frontend:
  image:
    tag: "main"

  replicaCount: 1

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ClickHouse
clickhouse:
  persistence:
    enabled: true
    size: 20Gi

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  config:
    retention_days: 30

# Ingress (可选开启)
ingress:
  enabled: false
  hosts:
    - host: edge-logs-staging.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend

# Log Collector (可选开启)
logCollector:
  enabled: false