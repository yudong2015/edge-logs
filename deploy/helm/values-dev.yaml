# Development environment values for edge-logs
# This overrides default values in edge-logs/values.yaml

# 使用国内镜像仓库
global:
  imageRegistry: "quanzhenglong.com/edge"

namespaceOverride: "edge-logs-dev"

# APIServer
apiserver:
  image:
    tag: "develop"

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Frontend
frontend:
  image:
    tag: "develop"

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# ClickHouse
clickhouse:
  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  config:
    retention_days: 7

# Ingress (disabled for dev)
ingress:
  enabled: false

# Note: Log collection is handled by iLogtail (external component)