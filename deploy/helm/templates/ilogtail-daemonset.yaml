---
# iLogtail DaemonSet for log collection with K8s metadata
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ilogtail
  namespace: {{ include "edge-logs.namespace" . }}
  labels:
    app: ilogtail
    component: log-collector
spec:
  selector:
    matchLabels:
      app: ilogtail
  template:
    metadata:
      labels:
        app: ilogtail
        component: log-collector
    spec:
      serviceAccountName: {{ include "edge-logs.serviceAccountName" . }}
      automountServiceAccountToken: false
{{- if .Values.otelCollector.enabled }}
      initContainers:
        - name: wait-for-otel
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z otel-collector 4317; do echo "waiting for otel-collector:4317"; sleep 2; done; echo "otel-collector is ready"']
{{- end }}
      containers:
        - name: ilogtail
          image: {{ include "edge-logs.ilogtail.image" . }}
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: ALIYUN_LOG_ENV_TAGS
              value: ""
            - name: LOG_DATASET
              valueFrom:
                configMapKeyRef:
                  name: ilogtail-env
                  key: dataset
                  optional: true
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config
              mountPath: /usr/local/ilogtail/config/local/user_config.yaml
              subPath: user_yaml_config.d
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdocker
              mountPath: /var/lib/docker
              readOnly: true
            - name: run
              mountPath: /run
              readOnly: true
            - name: checkpoint
              mountPath: /usr/local/ilogtail/checkpoint
      volumes:
        - name: config
          configMap:
            name: ilogtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdocker
          hostPath:
            path: /var/lib/docker
        - name: run
          hostPath:
            path: /run
        - name: checkpoint
          hostPath:
            path: /var/lib/ilogtail-checkpoint
            type: DirectoryOrCreate
      tolerations:
        - operator: Exists
      nodeSelector:
        kubernetes.io/os: linux
