---
# OpenTelemetry Collector for Edge Logs with K8s metadata extraction
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ include "edge-logs.namespace" . }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 150
        spike_limit_mib: 30

      # Transform processor to extract K8s metadata from __path__
      # Use resource context to extract and add to resource attributes
      transform:
        log_statements:
          # First, extract from log attributes to promote to resource attributes
          - context: log
            statements:
              # Extract dataset field from log attributes and promote to resource attribute
              # cluster_dataset is added by iLogtail processor_add_fields
              - set(resource.attributes["dataset"], attributes["cluster_dataset"])

          # Then, extract from resource context for K8s metadata
          - context: resource
            statements:
              # Extract pod name: /var/log/containers/<pod>_<namespace>_<container>-<hash>.log
              # Split by "/" to get filename, then split by "_" and take first part (pod name)
              - set(attributes["k8s.pod.name"], Split(Split(attributes["__path__"], "/")[4], "_")[0])
              # Extract namespace name
              - set(attributes["k8s.namespace.name"], Split(attributes["__path__"], "_")[1])
              # Extract container name
              - set(attributes["k8s.container.name"], Split(Split(attributes["__path__"], "_")[2], "-")[0])

      batch:
        timeout: 1s
        send_batch_size: 1024
        send_batch_max_size: 2048

      resource:
        attributes:
          - key: deployment.environment
            value: "production"
            action: upsert

    exporters:
      clickhouse:
        endpoint: tcp://{{ include "edge-logs.clickhouse.serviceName" . }}:9000
        database: edge_logs
        logs_table_name: otel_logs
        create_schema: false
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Debug exporter disabled to prevent 73GB log bloat
      # Uncomment only for troubleshooting, then remove immediately
      # debug:
      #   verbosity: normal

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]

      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, transform, batch]
          exporters: [clickhouse]

      telemetry:
        logs:
          level: "warn"  # Reduced from "info" to prevent excessive logging
        metrics:
          level: "basic"
