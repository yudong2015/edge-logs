{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edge-logs.fullname" . }}-clickhouse-init
  namespace: {{ include "edge-logs.namespace" . }}
  labels:
    {{- include "edge-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
data:
  users.xml: |
    <clickhouse>
      <users>
        <default>
          <password></password>
          <networks>
            <ip>::/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
          <access_management>1</access_management>
        </default>
      </users>
    </clickhouse>
  01_tables.sql: |
    -- ClickHouse schema for edge-logs
    -- Clean OTEL standard schema with separate K8s target table and materialized view
    CREATE DATABASE IF NOT EXISTS edge_logs;
    USE edge_logs;

    -- Main logs table (clean OTEL standard schema, no MATERIALIZED columns)
    CREATE TABLE IF NOT EXISTS logs (
        -- ============================================================
        -- OTEL Standard Fields (100% compliant with OTEL Collector)
        -- ============================================================

        Timestamp DateTime64(9) CODEC(Delta(8), ZSTD(1)),
        TimestampTime DateTime DEFAULT toDateTime(Timestamp) CODEC(Delta(8), ZSTD(1)),
        TraceId String CODEC(ZSTD(1)),
        SpanId String CODEC(ZSTD(1)),
        TraceFlags UInt8,
        SeverityText LowCardinality(String) CODEC(ZSTD(1)),
        SeverityNumber UInt8,
        ServiceName LowCardinality(String) CODEC(ZSTD(1)),
        Body String CODEC(ZSTD(1)),

        -- OTEL standard metadata fields
        ResourceSchemaUrl LowCardinality(String) CODEC(ZSTD(1)),
        ResourceAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        ScopeSchemaUrl LowCardinality(String) CODEC(ZSTD(1)),
        ScopeName String CODEC(ZSTD(1)),
        ScopeVersion LowCardinality(String) CODEC(ZSTD(1)),
        ScopeAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        LogAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        EventName String CODEC(ZSTD(1)),

        -- ============================================================
        -- Data Isolation Field
        -- ============================================================

        dataset LowCardinality(String) DEFAULT 'default' CODEC(ZSTD(1)),

        -- ============================================================
        -- Indexes for Performance Optimization
        -- ============================================================

        INDEX idx_trace_id TraceId TYPE bloom_filter(0.001) GRANULARITY 1,
        INDEX idx_service_name ServiceName TYPE set(1000) GRANULARITY 1,
        INDEX idx_severity_text SeverityText TYPE set(20) GRANULARITY 1,
        INDEX idx_dataset dataset TYPE set(100) GRANULARITY 1,
        INDEX idx_res_attr_key mapKeys(ResourceAttributes) TYPE bloom_filter(0.01) GRANULARITY 1,
        INDEX idx_res_attr_value mapValues(ResourceAttributes) TYPE bloom_filter(0.01) GRANULARITY 1,
        INDEX idx_log_attr_key mapKeys(LogAttributes) TYPE bloom_filter(0.01) GRANULARITY 1,
        INDEX idx_log_attr_value mapValues(LogAttributes) TYPE bloom_filter(0.01) GRANULARITY 1,
        INDEX idx_body Body TYPE tokenbf_v1(32768, 3, 0) GRANULARITY 8
    )
    ENGINE = MergeTree()
    PARTITION BY toDate(TimestampTime)
    PRIMARY KEY (ServiceName, TimestampTime)
    ORDER BY (ServiceName, TimestampTime, Timestamp)
    TTL TimestampTime + INTERVAL {{ .Values.clickhouse.config.retention_days }} DAY DELETE
    SETTINGS index_granularity = 8192, ttl_only_drop_parts = 1;

    -- K8s target table: all OTEL fields plus extracted K8s columns
    CREATE TABLE IF NOT EXISTS logs_k8s (
        -- ============================================================
        -- OTEL Standard Fields
        -- ============================================================

        Timestamp DateTime64(9) CODEC(Delta(8), ZSTD(1)),
        TimestampTime DateTime DEFAULT toDateTime(Timestamp) CODEC(Delta(8), ZSTD(1)),
        TraceId String CODEC(ZSTD(1)),
        SpanId String CODEC(ZSTD(1)),
        TraceFlags UInt8,
        SeverityText LowCardinality(String) CODEC(ZSTD(1)),
        SeverityNumber UInt8,
        ServiceName LowCardinality(String) CODEC(ZSTD(1)),
        Body String CODEC(ZSTD(1)),

        ResourceSchemaUrl LowCardinality(String) CODEC(ZSTD(1)),
        ResourceAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        ScopeSchemaUrl LowCardinality(String) CODEC(ZSTD(1)),
        ScopeName String CODEC(ZSTD(1)),
        ScopeVersion LowCardinality(String) CODEC(ZSTD(1)),
        ScopeAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        LogAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        EventName String CODEC(ZSTD(1)),

        dataset LowCardinality(String) DEFAULT 'default' CODEC(ZSTD(1)),

        -- ============================================================
        -- Extracted K8s Columns
        -- ============================================================

        k8s_namespace_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_pod_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_container_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_node_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_container_id String CODEC(ZSTD(1)),
        host_ip LowCardinality(String) CODEC(ZSTD(1)),
        host_name LowCardinality(String) CODEC(ZSTD(1)),

        -- ============================================================
        -- Indexes
        -- ============================================================

        INDEX idx_k8s_namespace k8s_namespace_name TYPE set(1000) GRANULARITY 1,
        INDEX idx_k8s_pod k8s_pod_name TYPE set(10000) GRANULARITY 1,
        INDEX idx_k8s_container k8s_container_name TYPE set(1000) GRANULARITY 1,
        INDEX idx_k8s_node k8s_node_name TYPE set(1000) GRANULARITY 1,
        INDEX idx_k8s_container_id k8s_container_id TYPE set(10000) GRANULARITY 1,
        INDEX idx_host_ip host_ip TYPE set(100) GRANULARITY 1,
        INDEX idx_host_name host_name TYPE set(100) GRANULARITY 1
    )
    ENGINE = MergeTree()
    PARTITION BY toDate(TimestampTime)
    PRIMARY KEY (k8s_namespace_name, k8s_pod_name, TimestampTime)
    ORDER BY (k8s_namespace_name, k8s_pod_name, TimestampTime, Timestamp)
    TTL TimestampTime + INTERVAL {{ .Values.clickhouse.config.retention_days }} DAY DELETE
    SETTINGS index_granularity = 8192, ttl_only_drop_parts = 1;

    -- Materialized view: extracts K8s metadata from logs into logs_k8s
    CREATE MATERIALIZED VIEW IF NOT EXISTS logs_k8s_mv TO logs_k8s AS
    SELECT
        Timestamp,
        TimestampTime,
        TraceId,
        SpanId,
        TraceFlags,
        SeverityText,
        SeverityNumber,
        ServiceName,
        Body,
        ResourceSchemaUrl,
        ResourceAttributes,
        ScopeSchemaUrl,
        ScopeName,
        ScopeVersion,
        ScopeAttributes,
        LogAttributes,
        EventName,
        dataset,
        ResourceAttributes['k8s.namespace.name'] AS k8s_namespace_name,
        ResourceAttributes['k8s.pod.name'] AS k8s_pod_name,
        ResourceAttributes['k8s.container.name'] AS k8s_container_name,
        LogAttributes['k8s.node.name'] AS k8s_node_name,
        LogAttributes['container.id'] AS k8s_container_id,
        ResourceAttributes['host.ip'] AS host_ip,
        ResourceAttributes['host.name'] AS host_name
    FROM logs;

    -- Datasets table
    CREATE TABLE IF NOT EXISTS datasets (
        name String,
        display_name String,
        description String,
        created_at DateTime DEFAULT now(),
        updated_at DateTime DEFAULT now(),
        retention_days UInt32 DEFAULT {{ .Values.clickhouse.config.retention_days }},
        is_active UInt8 DEFAULT 1
    )
    ENGINE = ReplacingMergeTree(updated_at)
    ORDER BY (name);

    -- Insert default dataset
    -- ClickHouse uses INSERT OR REPLACE / IGNORE instead of ON DUPLICATE KEY UPDATE
    -- Since datasets table has ReplacingMergeTree, we just use simple INSERT
    INSERT INTO datasets (name, display_name, description) VALUES
    ('default', 'Default Dataset', 'Default dataset for edge logs');

  02_migrations.sql: |
    -- Migration: Remove MATERIALIZED columns from logs (if they exist from a previous schema),
    -- create logs_k8s target table and logs_k8s_mv materialized view.
    -- Idempotent (IF NOT EXISTS / IF EXISTS) - safe to run on every startup.
    USE edge_logs;

    -- Drop skip indexes first (required before dropping the columns they reference)
    ALTER TABLE logs DROP INDEX IF EXISTS idx_k8s_namespace;
    ALTER TABLE logs DROP INDEX IF EXISTS idx_k8s_pod;
    ALTER TABLE logs DROP INDEX IF EXISTS idx_k8s_container;
    ALTER TABLE logs DROP INDEX IF EXISTS idx_k8s_node;
    ALTER TABLE logs DROP INDEX IF EXISTS idx_host_ip;
    ALTER TABLE logs DROP INDEX IF EXISTS idx_host_name;

    -- Drop old MATERIALIZED columns from logs if they exist
    ALTER TABLE logs DROP COLUMN IF EXISTS k8s_namespace_name;
    ALTER TABLE logs DROP COLUMN IF EXISTS k8s_pod_name;
    ALTER TABLE logs DROP COLUMN IF EXISTS k8s_container_name;
    ALTER TABLE logs DROP COLUMN IF EXISTS k8s_node_name;
    ALTER TABLE logs DROP COLUMN IF EXISTS host_ip;
    ALTER TABLE logs DROP COLUMN IF EXISTS host_name;

    -- Create logs_k8s target table if it does not exist
    CREATE TABLE IF NOT EXISTS logs_k8s (
        Timestamp DateTime64(9) CODEC(Delta(8), ZSTD(1)),
        TimestampTime DateTime DEFAULT toDateTime(Timestamp) CODEC(Delta(8), ZSTD(1)),
        TraceId String CODEC(ZSTD(1)),
        SpanId String CODEC(ZSTD(1)),
        TraceFlags UInt8,
        SeverityText LowCardinality(String) CODEC(ZSTD(1)),
        SeverityNumber UInt8,
        ServiceName LowCardinality(String) CODEC(ZSTD(1)),
        Body String CODEC(ZSTD(1)),
        ResourceSchemaUrl LowCardinality(String) CODEC(ZSTD(1)),
        ResourceAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        ScopeSchemaUrl LowCardinality(String) CODEC(ZSTD(1)),
        ScopeName String CODEC(ZSTD(1)),
        ScopeVersion LowCardinality(String) CODEC(ZSTD(1)),
        ScopeAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        LogAttributes Map(LowCardinality(String), String) CODEC(ZSTD(1)),
        EventName String CODEC(ZSTD(1)),
        dataset LowCardinality(String) DEFAULT 'default' CODEC(ZSTD(1)),
        k8s_namespace_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_pod_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_container_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_node_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_container_id String CODEC(ZSTD(1)),
        host_ip LowCardinality(String) CODEC(ZSTD(1)),
        host_name LowCardinality(String) CODEC(ZSTD(1)),
        INDEX idx_k8s_namespace k8s_namespace_name TYPE set(1000) GRANULARITY 1,
        INDEX idx_k8s_pod k8s_pod_name TYPE set(10000) GRANULARITY 1,
        INDEX idx_k8s_container k8s_container_name TYPE set(1000) GRANULARITY 1,
        INDEX idx_k8s_node k8s_node_name TYPE set(1000) GRANULARITY 1,
        INDEX idx_k8s_container_id k8s_container_id TYPE set(10000) GRANULARITY 1,
        INDEX idx_host_ip host_ip TYPE set(100) GRANULARITY 1,
        INDEX idx_host_name host_name TYPE set(100) GRANULARITY 1
    )
    ENGINE = MergeTree()
    PARTITION BY toDate(TimestampTime)
    PRIMARY KEY (k8s_namespace_name, k8s_pod_name, TimestampTime)
    ORDER BY (k8s_namespace_name, k8s_pod_name, TimestampTime, Timestamp)
    TTL TimestampTime + INTERVAL {{ .Values.clickhouse.config.retention_days }} DAY DELETE
    SETTINGS index_granularity = 8192, ttl_only_drop_parts = 1;

    -- Create logs_k8s_mv materialized view if it does not exist
    CREATE MATERIALIZED VIEW IF NOT EXISTS logs_k8s_mv TO logs_k8s AS
    SELECT
        Timestamp,
        TimestampTime,
        TraceId,
        SpanId,
        TraceFlags,
        SeverityText,
        SeverityNumber,
        ServiceName,
        Body,
        ResourceSchemaUrl,
        ResourceAttributes,
        ScopeSchemaUrl,
        ScopeName,
        ScopeVersion,
        ScopeAttributes,
        LogAttributes,
        EventName,
        dataset,
        ResourceAttributes['k8s.namespace.name'] AS k8s_namespace_name,
        ResourceAttributes['k8s.pod.name'] AS k8s_pod_name,
        ResourceAttributes['k8s.container.name'] AS k8s_container_name,
        LogAttributes['k8s.node.name'] AS k8s_node_name,
        LogAttributes['container.id'] AS k8s_container_id,
        ResourceAttributes['host.ip'] AS host_ip,
        ResourceAttributes['host.name'] AS host_name
    FROM logs;

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-logs.clickhouse.serviceName" . }}
  namespace: {{ include "edge-logs.namespace" . }}
  labels:
    {{- include "edge-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  type: {{ .Values.clickhouse.service.type }}
  ports:
    - name: http
      port: {{ .Values.clickhouse.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: tcp
      port: {{ .Values.clickhouse.service.tcpPort }}
      targetPort: tcp
      protocol: TCP
  selector:
    {{- include "edge-logs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "edge-logs.fullname" . }}-clickhouse
  namespace: {{ include "edge-logs.namespace" . }}
  labels:
    {{- include "edge-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: {{ include "edge-logs.clickhouse.serviceName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "edge-logs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        {{- include "edge-logs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: clickhouse
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: clickhouse
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "edge-logs.clickhouse.image" . }}
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.clickhouse.service.httpPort }}
              protocol: TCP
            - name: tcp
              containerPort: {{ .Values.clickhouse.service.tcpPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            # Temporarily disabled to test OTel auto-create schema
            # - name: init-scripts
            #   mountPath: /docker-entrypoint-initdb.d
            - name: users-config
              mountPath: /etc/clickhouse-server/users.d/users.xml
              subPath: users.xml
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "edge-logs.fullname" . }}-clickhouse-init
        - name: users-config
          configMap:
            name: {{ include "edge-logs.fullname" . }}-clickhouse-init
            items:
              - key: users.xml
                path: users.xml
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "edge-logs.labels" . | nindent 10 }}
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.clickhouse.persistence.storageClass }}
        {{- if (eq "-" .Values.clickhouse.persistence.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ .Values.clickhouse.persistence.storageClass | quote }}
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.persistence.size | quote }}
  {{- else }}
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}