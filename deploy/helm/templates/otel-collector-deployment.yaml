---
# OpenTelemetry Collector for Edge Logs with K8s metadata extraction
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ include "edge-logs.namespace" . }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 150
        spike_limit_mib: 30

      # Transform processor to extract K8s metadata from __path__
      # Use resource context to extract and add to resource attributes
      transform:
        log_statements:
          # First, extract from resource context to modify resource attributes
          - context: resource
            statements:
              # Extract pod name: /var/log/containers/<pod>_<namespace>_<container>-<hash>.log
              # Split by "/" to get filename, then split by "_" and take first part (pod name)
              - set(attributes["k8s.pod.name"], Split(Split(attributes["__path__"], "/")[4], "_")[0])
              # Extract namespace name
              - set(attributes["k8s.namespace.name"], Split(attributes["__path__"], "_")[1])
              # Extract container name
              - set(attributes["k8s.container.name"], Split(Split(attributes["__path__"], "_")[2], "-")[0])

      batch:
        timeout: 1s
        send_batch_size: 1024
        send_batch_max_size: 2048

      resource:
        attributes:
          - key: deployment.environment
            value: "production"
            action: upsert

    exporters:
      clickhouse:
        endpoint: tcp://{{ include "edge-logs.clickhouse.serviceName" . }}:9000
        database: edge_logs
        logs_table_name: logs
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Debug exporter disabled to prevent 73GB log bloat
      # Uncomment only for troubleshooting, then remove immediately
      # debug:
      #   verbosity: normal

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]

      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, transform, batch]
          exporters: [clickhouse]

      telemetry:
        logs:
          level: "warn"  # Reduced from "info" to prevent excessive logging
        metrics:
          level: "basic"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: {{ include "edge-logs.namespace" . }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: {{ include "edge-logs.namespace" . }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ include "edge-logs.namespace" . }}
  labels:
    app: otel-collector
    component: data-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        component: data-pipeline
    spec:
      serviceAccountName: otel-collector
      {{- if .Values.otelCollector.initContainer.enabled }}
      initContainers:
        - name: init-clickhouse-tables
          image: {{ include "edge-logs.clickhouse.image" . }}
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for ClickHouse to be ready..."
              for i in $(seq 1 60); do
                if clickhouse-client --host {{ include "edge-logs.clickhouse.serviceName" . }}.{{ include "edge-logs.namespace" . }}.svc.cluster.local --port 9000 --query "SELECT 1" &>/dev/null; then
                  echo "ClickHouse is ready"
                  break
                fi
                echo "Waiting for ClickHouse... ($i/60)"
                sleep 2
              done

              # Additional wait to ensure ClickHouse SQL engine is fully ready
              echo "Waiting 10 seconds for ClickHouse SQL engine to stabilize..."
              sleep 10

              echo "Executing ClickHouse initialization scripts..."
              for sql_file in /docker-entrypoint-initdb.d/*.sql; do
                if [ -f "$sql_file" ]; then
                  echo "Executing $sql_file..."
                  clickhouse-client --host {{ include "edge-logs.clickhouse.serviceName" . }}.{{ include "edge-logs.namespace" . }}.svc.cluster.local --port 9000 --multiquery < "$sql_file" || echo "Failed to execute $sql_file"
                fi
              done
              echo "ClickHouse initialization completed"
          volumeMounts:
            - name: clickhouse-init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            {{- toYaml .Values.otelCollector.initContainer.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: otel-collector
          image: {{ include "edge-logs.otelCollector.image" . }}
          imagePullPolicy: IfNotPresent
          command:
            - "/otelcol-contrib"
            - "--config=/etc/otelcol-contrib/otel-collector-config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
            - name: metrics
              containerPort: 8888
          env:
            - name: GOMEMLIMIT
              value: "160MiB"
            - name: OTLP_LOG_LEVEL
              value: "warn"  # Minimize log output to prevent disk space issues
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - mountPath: /etc/otelcol-contrib/otel-collector-config.yaml
              name: otel-collector-config
              subPath: otel-collector-config.yaml
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        {{- if .Values.otelCollector.initContainer.enabled }}
        - configMap:
            name: {{ include "edge-logs.fullname" . }}-clickhouse-init
          name: clickhouse-init-scripts
        {{- end }}
        - configMap:
            items:
              - key: otel-collector-config.yaml
                path: otel-collector-config.yaml
            name: otel-collector-config
          name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ include "edge-logs.namespace" . }}
  labels:
    app: otel-collector
    component: data-pipeline
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
    - name: otlp-http
      port: 4318
    - name: metrics
      port: 8888
  selector:
    app: otel-collector
