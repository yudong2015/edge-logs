{{- if .Values.otelCollector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ include "edge-logs.namespace" . }}
  labels:
    app: otel-collector
    component: data-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        component: data-pipeline
    spec:
      serviceAccountName: otel-collector
      {{- if .Values.otelCollector.initContainer.enabled }}
      initContainers:
        # Step 1: Wait for ClickHouse TCP port using busybox (has nc command)
        - name: wait-for-clickhouse
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              CLICKHOUSE_HOST="{{ include "edge-logs.clickhouse.serviceName" . }}.{{ include "edge-logs.namespace" . }}.svc.cluster.local"
              CLICKHOUSE_PORT=9000

              echo "Waiting for ClickHouse at $CLICKHOUSE_HOST:$CLICKHOUSE_PORT..."
              until nc -z $CLICKHOUSE_HOST $CLICKHOUSE_PORT; do
                echo "ClickHouse not ready, waiting..."
                sleep 2
              done
              echo "ClickHouse TCP port is ready!"
              sleep 10
        # Step 2: Execute SQL scripts using ClickHouse client
        - name: init-clickhouse-tables
          image: {{ include "edge-logs.clickhouse.image" . }}
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              set -e
              CLICKHOUSE_HOST="{{ include "edge-logs.clickhouse.serviceName" . }}.{{ include "edge-logs.namespace" . }}.svc.cluster.local"
              CLICKHOUSE_PORT=9000

              echo "Executing ClickHouse initialization scripts..."
              for sql_file in /docker-entrypoint-initdb.d/*.sql; do
                if [ -f "$sql_file" ]; then
                  echo "Executing $sql_file..."
                  clickhouse-client --host $CLICKHOUSE_HOST --port $CLICKHOUSE_PORT --multiquery < "$sql_file" || {
                    echo "Failed to execute $sql_file, retrying once..."
                    sleep 5
                    clickhouse-client --host $CLICKHOUSE_HOST --port $CLICKHOUSE_PORT --multiquery < "$sql_file"
                  }
                fi
              done
              echo "ClickHouse initialization completed successfully"
          volumeMounts:
            - name: clickhouse-init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            {{- toYaml .Values.otelCollector.initContainer.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: otel-collector
          image: {{ include "edge-logs.otelCollector.image" . }}
          imagePullPolicy: IfNotPresent
          command:
            - "/otelcol-contrib"
            - "--config=/etc/otelcol-contrib/otel-collector-config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
            - name: metrics
              containerPort: 8888
          env:
            - name: GOMEMLIMIT
              value: "160MiB"
            - name: OTLP_LOG_LEVEL
              value: "warn"  # Minimize log output to prevent disk space issues
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - mountPath: /etc/otelcol-contrib/otel-collector-config.yaml
              name: otel-collector-config
              subPath: otel-collector-config.yaml
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        {{- if .Values.otelCollector.initContainer.enabled }}
        - configMap:
            name: {{ include "edge-logs.fullname" . }}-clickhouse-init
          name: clickhouse-init-scripts
        {{- end }}
        - configMap:
            items:
              - key: otel-collector-config.yaml
                path: otel-collector-config.yaml
            name: otel-collector-config
          name: otel-collector-config
{{- end }}
