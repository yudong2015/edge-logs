# Production environment values for edge-logs
# This overrides default values in edge-logs/values.yaml

# 使用国内镜像仓库
global:
  imageRegistry: "quanzhenglong.com/edge"

namespaceOverride: "edge-logs"

# APIServer
apiserver:
  image:
    tag: "latest"

  replicaCount: 2

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# Frontend
frontend:
  image:
    tag: "latest"

  replicaCount: 2

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# ClickHouse
clickhouse:
  persistence:
    enabled: true
    size: 100Gi

  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"

  config:
    retention_days: 90

# Ingress (生产环境建议开启)
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: edge-logs.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: edge-logs-tls
      hosts:
        - edge-logs.example.com

# Log Collector (生产环境开启)
logCollector:
  enabled: true

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  config:
    flush_interval: 5
    log_level: warn
    auth_token: "prod-collector-token-456"

# Node selector for production workloads
nodeSelector:
  node-role.kubernetes.io/worker: "true"

# Anti-affinity for HA
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - edge-logs
        topologyKey: kubernetes.io/hostname