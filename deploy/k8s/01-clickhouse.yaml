# ClickHouse deployment for edge-logs
# Provides log storage backend with optimized schema
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init-scripts
  namespace: ${NAMESPACE}
  labels:
    app: clickhouse
data:
  01_tables.sql: |
    -- ClickHouse schema for edge-logs
    CREATE DATABASE IF NOT EXISTS edge_logs;
    USE edge_logs;

    -- Main logs table
    CREATE TABLE IF NOT EXISTS logs (
        timestamp          DateTime64(9) CODEC(Delta(8), ZSTD(1)),
        dataset            LowCardinality(String) CODEC(ZSTD(1)),
        content            String CODEC(ZSTD(1)),
        severity           LowCardinality(String) CODEC(ZSTD(1)),
        container_id       String CODEC(ZSTD(1)),
        container_name     LowCardinality(String) CODEC(ZSTD(1)),
        pid                String CODEC(ZSTD(1)),
        host_ip            LowCardinality(String) CODEC(ZSTD(1)),
        host_name          LowCardinality(String) CODEC(ZSTD(1)),
        k8s_namespace_name LowCardinality(String) CODEC(ZSTD(1)),
        k8s_pod_name       LowCardinality(String) CODEC(ZSTD(1)),
        k8s_pod_uid        String CODEC(ZSTD(1)),
        k8s_node_name      LowCardinality(String) CODEC(ZSTD(1)),
        tags               Map(String, String) CODEC(ZSTD(1)),
        INDEX idx_content content TYPE tokenbf_v1(32768, 3, 0) GRANULARITY 1,
        INDEX idx_tags tags TYPE bloom_filter GRANULARITY 1
    )
    ENGINE = MergeTree()
    PARTITION BY (dataset, toDate(timestamp))
    ORDER BY (dataset, host_ip, timestamp)
    TTL toDateTime(timestamp) + INTERVAL 30 DAY DELETE
    SETTINGS index_granularity = 8192, ttl_only_drop_parts = 1;

    -- Datasets table
    CREATE TABLE IF NOT EXISTS datasets (
        name String,
        display_name String,
        description String,
        created_at DateTime DEFAULT now(),
        updated_at DateTime DEFAULT now(),
        retention_days UInt32 DEFAULT 30,
        is_active UInt8 DEFAULT 1
    ) ENGINE = MergeTree()
    ORDER BY name;

    -- Query statistics table
    CREATE TABLE IF NOT EXISTS query_stats (
        query_id String,
        dataset String,
        user_id String DEFAULT '',
        query_type LowCardinality(String),
        query_params String,
        execution_time_ms UInt32,
        rows_examined UInt64,
        rows_returned UInt64,
        created_at DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMM(created_at)
    ORDER BY (dataset, created_at)
    TTL created_at + INTERVAL 30 DAY DELETE;

    -- Default dataset
    INSERT INTO datasets (name, display_name, description)
    SELECT 'default', 'Default Dataset', 'Default dataset for all logs'
    WHERE NOT EXISTS (
        SELECT 1 FROM datasets WHERE name = 'default'
    );

    -- Severity stats supporting table
    CREATE TABLE IF NOT EXISTS severity_stats (
        dataset String,
        k8s_namespace_name String,
        severity String,
        hour DateTime,
        count UInt64
    ) ENGINE = SummingMergeTree()
    PARTITION BY toYYYYMM(hour)
    ORDER BY (dataset, k8s_namespace_name, severity, hour);

    -- Materialized view for severity statistics
    CREATE MATERIALIZED VIEW IF NOT EXISTS severity_stats_mv
    TO severity_stats
    AS SELECT
        dataset,
        k8s_namespace_name,
        severity,
        toStartOfHour(timestamp) as hour,
        count() as count
    FROM logs
    GROUP BY dataset, k8s_namespace_name, severity, hour;
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: ${NAMESPACE}
  labels:
    app: clickhouse
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  selector:
    app: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: ${NAMESPACE}
  labels:
    app: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.3
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          env:
            - name: CLICKHOUSE_DB
              value: "edge_logs"
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: clickhouse-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
