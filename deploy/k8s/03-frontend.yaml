# Frontend deployment for edge-logs
# Provides Web UI for log exploration
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-logs-frontend
  namespace: edge-logs
  labels:
    app: edge-logs-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-logs-frontend
  template:
    metadata:
      labels:
        app: edge-logs-frontend
    spec:
      containers:
        - name: frontend
          image: ${DOCKER_REGISTRY}/${DOCKER_REPO}-frontend:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: edge-logs-frontend
  namespace: edge-logs
  labels:
    app: edge-logs-frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: edge-logs-frontend
