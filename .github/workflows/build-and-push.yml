name: Build and Push Images

on:
  push:
    branches:
      - main
      - develop
      - 'release-*'
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: yudong2015/edge-logs
  PRIVATE_REGISTRY: quanzhenglong.com
  PRIVATE_REPO: edge

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name != 'pull_request'
    strategy:
      matrix:
        component: [logs-apiserver, logs-frontend]
        include:
          - component: logs-apiserver
            context: .
            dockerfile: ./deploy/apiserver/Dockerfile
          - component: logs-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Private Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.PRIVATE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Determine build platforms
        id: platforms
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
          else
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable=${{ startsWith(github.ref, 'refs/heads/release-') }}
            type=raw,value={{branch}}-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/release-') }}
            type=raw,value=main,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=main-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
          flavor: |
            latest=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push image to GHCR
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Push to Private Registry
        run: |
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          PRIVATE_IMAGE="${{ env.PRIVATE_REGISTRY }}/${{ env.PRIVATE_REPO }}/${{ matrix.component }}:${SHORT_SHA}"

          # Get the first tag from the build step (the actual image that was pushed)
          GHCR_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)

          # Determine additional tags
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            PRIVATE_LATEST="${{ env.PRIVATE_REGISTRY }}/${{ env.PRIVATE_REPO }}/${{ matrix.component }}:${TAG_NAME}"
            docker tag ${GHCR_TAG} ${PRIVATE_LATEST}
            docker push ${PRIVATE_LATEST}
            echo "Tagged and pushed: ${PRIVATE_LATEST}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PRIVATE_LATEST="${{ env.PRIVATE_REGISTRY }}/${{ env.PRIVATE_REPO }}/${{ matrix.component }}:latest"
            docker tag ${GHCR_TAG} ${PRIVATE_IMAGE}
            docker tag ${GHCR_TAG} ${PRIVATE_LATEST}
            docker push ${PRIVATE_IMAGE}
            docker push ${PRIVATE_LATEST}
            echo "Pushed: ${PRIVATE_IMAGE}"
            echo "Pushed: ${PRIVATE_LATEST}"
          else
            docker tag ${GHCR_TAG} ${PRIVATE_IMAGE}
            docker push ${PRIVATE_IMAGE}
            echo "Pushed: ${PRIVATE_IMAGE}"
          fi
        id: private

      - name: Also push to ttl.sh (public, 7-day TTL) for apiserver only
        if: matrix.component == 'logs-apiserver' && github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          TTL_IMAGE="ttl.sh/edge-logs-apiserver-${SHORT_SHA}:7d"
          docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component }}:main-${SHORT_SHA}
          docker tag ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component }}:main-${SHORT_SHA} ${TTL_IMAGE}
          docker push ${TTL_IMAGE}
          echo "ttl_image=${TTL_IMAGE}" >> $GITHUB_OUTPUT
          echo "Public image (7-day TTL): ${TTL_IMAGE}"
        id: ttl

      - name: Output image tags
        run: |
          echo "=== GitHub Container Registry (GHCR) ==="
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "=== Private Registry (quanzhenglong.com) ==="
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            echo "${{ env.PRIVATE_REGISTRY }}/${{ env.PRIVATE_REPO }}/${{ matrix.component }}:${TAG_NAME}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "${{ env.PRIVATE_REGISTRY }}/${{ env.PRIVATE_REPO }}/${{ matrix.component }}:latest"
            echo "${{ env.PRIVATE_REGISTRY }}/${{ env.PRIVATE_REPO }}/${{ matrix.component }}:${SHORT_SHA}"
          else
            echo "${{ env.PRIVATE_REGISTRY }}/${{ env.PRIVATE_REPO }}/${{ matrix.component }}:${SHORT_SHA}"
          fi
          echo ""
          if [[ -n "${{ steps.ttl.outputs.ttl_image }}" ]]; then
            echo "=== Public Registry (ttl.sh, 7-day TTL) ==="
            echo "${{ steps.ttl.outputs.ttl_image }}"
          fi

  deploy-notification:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify deployment
        run: |
          echo "=========================================="
          echo "Images built and pushed successfully!"
          echo "=========================================="
          echo ""
          echo "📦 GitHub Container Registry (GHCR):"
          echo "   - ghcr.io/yudong2015/edge-logs/logs-apiserver:latest"
          echo "   - ghcr.io/yudong2015/edge-logs/logs-frontend:latest"
          echo ""
          echo "🔒 Private Registry (quanzhenglong.com):"
          echo "   - quanzhenglong.com/edge/logs-apiserver:latest"
          echo "   - quanzhenglong.com/edge/logs-frontend:latest"
          echo ""
          echo "🌐 Public Registry (ttl.sh, 7-day TTL):"
          echo "   - ttl.sh/edge-logs-apiserver-<sha>:7d"
          echo "=========================================="
