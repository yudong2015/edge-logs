name: Build and Push Images

on:
  push:
    branches:
      - main
      - develop
      - 'release-*'
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.DOCKER_REGISTRY }}
  REPO: ${{ vars.DOCKER_REPO }}
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name != 'pull_request'
    strategy:
      matrix:
        component: [logs-apiserver, logs-frontend]
        include:
          - component: logs-apiserver
            context: .
            dockerfile: ./deploy/apiserver/Dockerfile
          - component: logs-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine build platforms
        id: platforms
        run: |
          # Build strategy:
          # - Tag releases: always multi-arch (amd64 + arm64)
          # - Manual triggers (workflow_dispatch): multi-arch for testing
          # - Push to main: amd64 only for fast feedback
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
            echo "📦 Building multi-arch for release"
          else
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
            echo "⚡ Building amd64 only for fast feedback"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable=${{ startsWith(github.ref, 'refs/heads/release-') }}
            type=raw,value={{branch}}-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/release-') }}
            type=raw,value=main,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=main-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
          flavor: |
            latest=${{ github.event_name == 'workflow_dispatch' }}

      - name: Generate image for deployment
        id: release-image
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component }}
          tags: |
            type=raw,value={{branch}}-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/main') }}
          flavor: |
            latest=false

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Output image tags
        run: |
          echo "Built and pushed: ${{ steps.meta.outputs.tags }}"
          echo "Release image: ${{ steps.release-image.outputs.tags }}"

  # TODO: Add security scanning when needed
  # security-scan:
  #   needs: [build]
  #   runs-on: self-hosted
  #   ...

  deploy-notification:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify deployment
        run: |
          echo "Images built and pushed successfully!"
          echo "Registry: ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_REPO }}"
          echo "Components: logs-apiserver, logs-frontend"
          echo ""
          echo "Deploy with: /deploy main"