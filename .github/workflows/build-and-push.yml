name: Build and Push Images

on:
  push:
    branches:
      - main
      - develop
      - 'release-*'
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: yudong2015/edge-logs

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name != 'pull_request'
    strategy:
      matrix:
        component: [logs-apiserver, logs-frontend]
        include:
          - component: logs-apiserver
            context: .
            dockerfile: ./deploy/apiserver/Dockerfile
          - component: logs-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine build platforms
        id: platforms
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
          else
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable=${{ startsWith(github.ref, 'refs/heads/release-') }}
            type=raw,value={{branch}}-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/release-') }}
            type=raw,value=main,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=main-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
          flavor: |
            latest=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push image to GHCR
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Also push to ttl.sh (public, 7-day TTL) for apiserver only
        if: matrix.component == 'logs-apiserver' && github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          TTL_IMAGE="ttl.sh/edge-logs-apiserver-${SHORT_SHA}:7d"
          docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component }}:main-${SHORT_SHA}
          docker tag ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.component }}:main-${SHORT_SHA} ${TTL_IMAGE}
          docker push ${TTL_IMAGE}
          echo "ttl_image=${TTL_IMAGE}" >> $GITHUB_OUTPUT
          echo "Public image (7-day TTL): ${TTL_IMAGE}"
        id: ttl

      - name: Output image tags
        run: |
          echo "GHCR: ${{ steps.meta.outputs.tags }}"
          if [[ -n "${{ steps.ttl.outputs.ttl_image }}" ]]; then
            echo "Public (ttl.sh): ${{ steps.ttl.outputs.ttl_image }}"
          fi

  deploy-notification:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify deployment
        run: |
          echo "Images built and pushed successfully!"
          echo "GHCR: ghcr.io/yudong2015/edge-logs"
          echo "Public (ttl.sh, 7d): ttl.sh/edge-logs-apiserver-<sha>:7d"
