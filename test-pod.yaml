apiVersion: v1
kind: Pod
metadata:
  name: log-test-app
  namespace: default
  labels:
    app: log-test
spec:
  tolerations:
  - key: "node-role.kubernetes.io/edge"
    operator: "Exists"
    effect: "NoSchedule"
  nodeSelector:
    kubernetes.io/hostname: edge-node-01
  containers:
  - name: log-generator
    image: busybox
    command:
    - /bin/sh
    - -c
    - |
      echo "Starting log test application on edge-node-01"
      while true; do
        echo "$(date) [INFO] Log message from edge-node-01 test application - Counter: $RANDOM"
        sleep 5
      done
  restartPolicy: Always