# Kubernetes Deployment for edge-logs frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-logs-frontend
  namespace: edge-logs
  labels:
    app: edge-logs-frontend
    component: webui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edge-logs-frontend
  template:
    metadata:
      labels:
        app: edge-logs-frontend
        component: webui
    spec:
      containers:
      - name: frontend
        image: ghcr.io/outpostos/edge-logs-frontend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      volumes:
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: edge-logs-frontend
  namespace: edge-logs
  labels:
    app: edge-logs-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: edge-logs-frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edge-logs-frontend
  namespace: edge-logs
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: logs.localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: edge-logs-frontend
            port:
              number: 80
